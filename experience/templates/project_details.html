{% extends 'main.html' %}
{% load static %}
{% block content %}
<div class="container project_detail">
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <img class="image" src="{{ project.image.url }}" alt="Project Image">
            </div>
            
        </div>
        <div class="col-md-6">
            <h3 >{{ project.project_name }}</h3>
            <p>{{ project.description }}</p>
            <a href="{{ project.link }}">Visit Site</a>

            <div>
                <a href="{% url 'home' %}#Projects">← Back to Projects</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
